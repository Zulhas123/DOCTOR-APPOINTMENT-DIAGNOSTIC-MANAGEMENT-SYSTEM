<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Doctor Assist — Hub</title>
    <meta name="description" content="Hub/Branch operations prototype shell." />
    <link rel="stylesheet" href="../styles.css" />
  </head>
  <body>
    <a class="skip-link" href="#main">Skip to content</a>
    <script>
      window.APP_CONTEXT = "hub";
    </script>

    <div class="app-shell">
      <aside class="sidebar" aria-label="Primary navigation">
        <div class="brand">
          <div class="brand-mark" aria-hidden="true">DA</div>
          <div class="brand-text">
            <div class="brand-title">Doctor Assist</div>
            <div class="brand-subtitle">Hub / Branch</div>
          </div>
        </div>

        <nav class="nav" id="nav"></nav>

        <div class="sidebar-footer">
          <div class="pill">
            <span class="pill-dot" aria-hidden="true"></span>
            <span id="envLabel">Local demo data</span>
          </div>
          <a class="btn btn-ghost" href="../index.html" style="text-decoration:none; text-align:center;">Back to launcher</a>
          <button class="btn btn-ghost" id="resetBtn" type="button">Reset demo data</button>
        </div>
      </aside>

      <div class="main">
        <header class="topbar">
          <div class="topbar-left">
            <button class="icon-btn" id="sidebarToggle" type="button" aria-label="Toggle navigation">☰</button>
            <div>
              <div class="page-title" id="pageTitle">Dashboard</div>
              <div class="page-subtitle" id="pageSubtitle">Hub day-to-day operations</div>
            </div>
          </div>
          <div class="topbar-right">
            <div class="search">
              <input id="globalSearch" type="search" placeholder="Search patient / mobile / invoice..." autocomplete="off" />
              <div class="kbd" aria-hidden="true">/</div>
            </div>
            <button class="btn" id="quickActionBtn" type="button">Quick actions</button>
          </div>
        </header>

        <main class="content" id="main" tabindex="-1">
          <div id="toastHost" class="toast-host" aria-live="polite" aria-atomic="true"></div>
          <div id="view"></div>
        </main>

        <footer class="footer">
          <span>Prototype only · No backend · Data stored in your browser</span>
          <span class="footer-sep" aria-hidden="true">•</span>
          <span id="clock">—</span>
        </footer>
      </div>
    </div>

    <dialog class="modal" id="modal">
      <form method="dialog" class="modal-card" id="modalForm">
        <div class="modal-head">
          <div class="modal-title" id="modalTitle">Modal</div>
          <button class="icon-btn" value="cancel" aria-label="Close">✕</button>
        </div>
        <div class="modal-body" id="modalBody"></div>
        <div class="modal-actions" id="modalActions">
          <button class="btn btn-ghost" value="cancel">Cancel</button>
          <button class="btn" id="modalPrimary" value="default">Save</button>
        </div>
      </form>
    </dialog>

    <template id="tpl-empty">
      <div class="empty">
        <div class="empty-title">Nothing here yet</div>
        <div class="empty-subtitle">Create something using the action buttons.</div>
      </div>
    </template>

    <script src="../app.js" defer></script>
  </body>
</html>
